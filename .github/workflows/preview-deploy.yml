name: Deploy Preview
on:
  workflow_run:
    workflows:
      - Start Preview Deployment
    types:
      - completed
permissions:
  contents: read
  packages: write
  deployments: write
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: staging-web
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            cloud.hplush.dev:443
            ghcr.io:443
            github.com:443
            nodejs.org:443
            raw.githubusercontent.com:443
      - name: Checkout the repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Download server from prepare step
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: preview-server
          repository: ${{ github.repository_owner }}/${{ github.event.repository.name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.PREVIEW_ARTIFACT_PAT }}
      - name: Extract PR number
        run: |
          PR_NUMBER=$(cat ./preview-id)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid preview-id: $PR_NUMBER"
            exit 1
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
      - name: Check preview label
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json labels --jq '.labels[].name')
          if ! echo "$LABELS" | grep -qx 'preview'; then
            echo "PR #$PR_NUMBER does not have 'preview' label, skipping deploy"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify about new deployment
        uses: bobheadxi/deployments@648679e8e4915b27893bd7dbc35cb504dc915bc8 # v1.5.0
        id: status
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_commit.id }}
          env: preview-${{ env.PR_NUMBER }}
      - name: Load Docker image
        run: docker load < image.tar
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        run: docker push ghcr.io/hplush/slowreader:preview-$PR_NUMBER
      - name: Deploy to Dokploy
        id: deploy
        env:
          API: https://cloud.hplush.dev/api
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
        run: |
          dokploy_api() {
            if [ -n "$2" ]; then
              curl -s -X POST "$API/$1" \
                -H 'accept: application/json' \
                -H "x-api-key: $DOKPLOY_TOKEN" \
                -H 'Content-Type: application/json' \
                -d "$2"
            else
              curl -s "$API/$1" \
                -H "x-api-key: $DOKPLOY_TOKEN"
            fi
          }

          APP_NAME="Preview $PR_NUMBER"
          PROJECTS=$(dokploy_api project.all)
          FIND='[.[].environments[].applications[]
            | select(.name == $name)][0]
            | .applicationId // empty'
          APP_ID=$(echo "$PROJECTS" \
            | jq -r --arg name "$APP_NAME" "$FIND")
          if [ -z "$APP_ID" ]; then

            ENV_ID=$(echo "$PROJECTS" | jq -r \
              '[.[].environments[]
                | select(.name == "production")][0]
                | .environmentId')
            APP_ID=$(dokploy_api application.create \
              "{\"name\": \"$APP_NAME\",
                \"environmentId\": \"$ENV_ID\"}" \
              | jq -r '.applicationId')

            IMAGE='ghcr.io/hplush/slowreader:preview-${{ env.PR_NUMBER }}'
            dokploy_api application.update \
              "{\"applicationId\": \"$APP_ID\",
                \"sourceType\": \"docker\",
                \"dockerImage\": \"$IMAGE\"}"

            HOST="preview-$PR_NUMBER.app.hplush.dev"
            dokploy_api domain.create \
              "{\"applicationId\": \"$APP_ID\",
                \"host\": \"$HOST\",
                \"port\": 2554,
                \"https\": true,
                \"certificateType\": \"letsencrypt\"}"

            ORIGIN="^https:\\/\\/$(echo "$HOST" | sed 's/\./\\\\./g')\$"
            ENV="ASSETS=1\nDATABASE_URL=memory://\nPROXY_ORIGIN=$ORIGIN"
            dokploy_api application.saveEnvironment \
              "{\"applicationId\": \"$APP_ID\",
                \"env\": \"$ENV\",
                \"buildArgs\": null,
                \"buildSecrets\": null,
                \"createEnvFile\": false}"

            dokploy_api application.deploy \
              "{\"applicationId\": \"$APP_ID\"}"

          else
            dokploy_api application.redeploy \
              "{\"applicationId\": \"$APP_ID\"}"
          fi
      - name: Wait for deployment
        run: sleep 120
      - name: Update deployment status
        uses: bobheadxi/deployments@648679e8e4915b27893bd7dbc35cb504dc915bc8 # v1.5.0
        if: always()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.status.outputs.env }}
          env_url: https://preview-${{ env.PR_NUMBER }}.app.hplush.dev/ui/
          deployment_id: ${{ steps.status.outputs.deployment_id }}
