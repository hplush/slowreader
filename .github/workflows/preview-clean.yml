name: Clean Preview
on:
  workflow_run:
    workflows:
      - Close Preview
    types:
      - completed
permissions:
  id-token: write
  deployments: write
  packages: write
jobs:
  clean:
    name: Clean
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            cloud.hplush.dev:443
            github.com:443
            ghcr.io:443
            raw.githubusercontent.com:443
      - name: Download PR number from prepare step
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: preview-id
          repository: ${{ github.repository_owner }}/${{ github.event.repository.name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.PREVIEW_ARTIFACT_PAT }}
          path: ./untrusted/
      - name: Extract PR number
        run: |
          PR_NUMBER=$(cat ./untrusted/preview-id)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid preview-id: $PR_NUMBER"
            exit 1
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
      - name: Disable deploy at GitHub
        continue-on-error: true
        uses: bobheadxi/deployments@648679e8e4915b27893bd7dbc35cb504dc915bc8 # v1.5.0
        with:
          step: delete-env
          token: ${{ secrets.PREVIEW_DEPLOYMENT_PAT }}
          env: preview-${{ env.PR_NUMBER }}
      - name: Delete Dokploy application
        env:
          API: https://cloud.hplush.dev/api
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
        run: |
          dokploy_api() {
            if [ -n "$2" ]; then
              curl -s -X POST "$API/$1" \
                -H 'accept: application/json' \
                -H "x-api-key: $DOKPLOY_TOKEN" \
                -H 'Content-Type: application/json' \
                -d "$2"
            else
              curl -s "$API/$1" \
                -H "x-api-key: $DOKPLOY_TOKEN"
            fi
          }

          FIND='[.[].environments[].applications[]
            | select(.name == $name)][0]
            | .applicationId // empty'
          APP_ID=$(dokploy_api project.all \
            | jq -r --arg name "Preview $PR_NUMBER" "$FIND")

          if [ -n "$APP_ID" ]; then
            dokploy_api application.delete \
              "{\"applicationId\": \"$APP_ID\"}"
          fi
      - name: Delete preview image
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          package: slowreader
          owner: hplush
          delete-tags: preview-${{ env.PR_NUMBER }}
          token: ${{ secrets.GITHUB_TOKEN }}
