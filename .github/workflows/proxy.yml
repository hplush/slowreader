name: Proxy
on:
  push:
    branches:
      - main
    paths:
      - 'proxy/*'
      - 'proxy/**/*'
      - '!proxy/*.md'
      - 'pnpm-lock.yaml'
      - '.github/workflows/proxy.yml'
      - '.github/actions/init-node/action.yml'
  pull_request:
    paths:
      - 'proxy/*'
      - 'proxy/**/*'
      - '!proxy/*.md'
      - 'pnpm-lock.yaml'
      - '.github/workflows/proxy.yml'
      - '.github/actions/init-node/action.yml'
jobs:
  test:
    name: Proxy Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            nodejs.org:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize Node.js
        uses: ./.github/actions/init-node
      - name: Run tests
        run: cd proxy && pnpm test
  build:
    name: Proxy Build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            nodejs.org:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize Node.js
        uses: ./.github/actions/init-node
        with:
          cache: false
          install: -F proxy --prod
      - name: Build server
        run: cd proxy && node --run build
      - name: Create archive to keep symlinks
        run: tar -cf proxy.tar proxy/dist/
      - name: Upload proxy build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proxy-build-${{ github.sha }}
          retention-days: 1
          include-hidden-files: true
          path: |
            ./proxy.tar
  staging:
    name: Proxy Staging Deploy
    needs:
      - test
      - build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    concurrency:
      group: staging-proxy
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: block
          allowed-endpoints: >
            9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
            api.github.com:443
            apk.cgr.dev:443
            cgr.dev:443
            github.com:443
            nodejs.org:443
            raw.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            cloud.hplush.dev:443
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download web assets from test step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: proxy-build-${{ github.sha }}
          path: ./
      - name: Extract archive to restore symlinks
        run: tar -xf proxy.tar
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          image-name: slowreader-proxy
          context: ./proxy/
          application-id: xZtJmL3JYQb0-4nBulOvn
          token: ${{ secrets.GITHUB_TOKEN }}
          dokploy-token: ${{ secrets.DOKPLOY_TOKEN }}
